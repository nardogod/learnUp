# Blueprint para deploy do LearnUP no Render
# - learnup-ollama: Ollama para LLM local
# - learnup-nlp: spaCy + modelo sueco KBLab (POS, validação gramatical)
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: learnup-ollama
    runtime: docker
    dockerfilePath: ./ollama-render/Dockerfile
    dockerContext: ./ollama-render
    region: oregon
    plan: free
    envVars:
      - key: OLLAMA_MODEL
        value: qwen2.5:0.5b
    healthCheckPath: /api/tags

  - type: web
    name: learnup-nlp
    runtime: docker
    dockerfilePath: ./nlp-service/Dockerfile
    dockerContext: ./nlp-service
    region: oregon
    plan: free
    healthCheckPath: /health
