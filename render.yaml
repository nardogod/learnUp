# Blueprint para deploy do Ollama no Render (usado pelo LearnUP)
# Plano FREE: 512MB RAM, dorme após 15min sem uso (~1min para acordar)
# Use qwen2.5:0.5b (~500MB) - o 1.5b pode não caber em 512MB
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: learnup-ollama
    runtime: docker
    dockerfilePath: ./ollama-render/Dockerfile
    dockerContext: ./ollama-render
    region: oregon

    plan: free

    envVars:
      - key: OLLAMA_MODEL
        value: qwen2.5:0.5b

    healthCheckPath: /api/tags
